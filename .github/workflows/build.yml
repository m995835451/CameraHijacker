name: Build Tweak

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
      - name: Build Package
        run: |
          make package
      - name: Upload deb
        uses: actions/upload-artifact@v3
        with:
          name: CameraHijacker.deb
          path: packages/*.deb
