name: Build Tweak with Docker

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: theos/theos:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Package
        run: |
          export THEOS=/theos
          make package
      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: CameraHijacker.deb
          path: packages/*.deb
